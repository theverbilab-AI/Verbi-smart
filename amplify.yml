version: 1
applications:
  - appRoot: care-dashboard
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - export VITE_API_URL="${VITE_API_URL:-https://api.care.verbilab.com}"
            - echo "Building dashboard with VITE_API_URL=$VITE_API_URL"
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
    redirects:
      - source: "/<*>"
        target: "/index.html"
        status: "404-200"
        condition: null
