# Dockerfile installs apt ffmpeg; imageio-ffmpeg in requirements is fallback if Nixpacks is used.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Must NOT contain $PORT — Railway passes it literally. gunicorn.conf.py reads PORT from env.
startCommand = "gunicorn app:app -c gunicorn.conf.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3