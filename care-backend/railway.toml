# Dockerfile installs apt ffmpeg; imageio-ffmpeg in requirements is fallback if Nixpacks is used.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use Dockerfile CMD (startCommand with $PORT was passed literally and crashed the container).
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3